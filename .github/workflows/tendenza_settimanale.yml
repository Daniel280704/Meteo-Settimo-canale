name: Invio Tendenza Settimanale

on:
  schedule:
    # Esegue alle 07:00 UTC (le 09:00 in Italia) SOLO il giorno 1 (Lunedì)
    - cron: '0 7 * * 1'
  workflow_dispatch:

jobs:
  invia_tendenza:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codice
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Installa dipendenze
        run: pip install requests google-generativeai

      - name: Esegui Script Tendenza
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python tendenza_settimanale.py
